### model
model_name_or_path: Qwen/Qwen3-VL-4B-Thinking
image_max_pixels: 262144
video_max_pixels: 163840
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: false
freeze_multi_modal_projector: false
use_muon: false

### dataset
dataset: robovqa_cosmos_sft_q1_train
eval_dataset: robovqa_cosmos_sft_q1_val
dataset_dir: SFT/data
media_dir: SFT/data/robovqa_cosmos_sft_q1
template: qwen3_vl
cutoff_len: 4096
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 4

### output
output_dir: outputs/sft/robovqa_cosmos_q1_qwen3vl4b_full_pipeline
logging_steps: 10
save_steps: 500
save_total_limit: 2
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 4
gradient_checkpointing: true
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.01
weight_decay: 0.01
bf16: true
torch_compile: true
ddp_timeout: 600
do_eval: true
eval_strategy: steps
eval_steps: 500
