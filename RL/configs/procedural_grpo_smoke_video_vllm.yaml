trainer:
  project_name: verl-post-training
  experiment_name: procedural-grpo-smoke-video-grpo
  nnodes: 1
  n_gpus_per_node: 1
  total_epochs: 1
  save_freq: -1
  test_freq: 1
  val_before_train: false
  default_local_dir: outputs/rl/procedural_grpo_smoke_video_vllm
  device: cuda
  ppo_mini_batch_size: 1
  ppo_micro_batch_size_per_gpu: 1
  ppo_max_token_len_per_gpu: 4096
  lr: 1.0e-6
  use_torch_compile: false

model:
  path: Qwen/Qwen2.5-VL-3B-Instruct
  trust_remote_code: true
  enable_gradient_checkpointing: true
  lora_rank: 4
  lora_alpha: 16
  exclude_modules: .*visual.*
  lora:
    merge: true
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  attn_implementation: sdpa

rollout:
  tensor_model_parallel_size: 1
  data_parallel_size: 1
  gpu_memory_utilization: 0.2
  temperature: 0.7
  top_p: 1.0
  top_k: -1
  n: 2
  max_num_batched_tokens: 2048
  max_num_seqs: 2
  max_model_len: 2048
  log_prob_micro_batch_size_per_gpu: 1
  enforce_eager: true
  free_cache_engine: true
  load_format: hf
  disable_log_stats: true
  enable_chunked_prefill: false
  enable_prefix_caching: false
  val_temperature: 0.0
  agent_num_workers: 1

data:
  train_file: RL/data/procedural_grpo_smoke/video_native/train.jsonl
  val_file: RL/data/procedural_grpo_smoke/video_native/val.jsonl
  max_prompt_length: 2048
  max_response_length: 64
  train_batch_size: 1
  val_batch_size: 1
  return_raw_chat: true
  return_multi_modal_inputs: true
  image_key: images
  video_key: videos
  filter_overlong_prompts: false
  dataloader_num_workers: 0

reward:
  num_workers: 1
  custom_reward_function:
    path: RL/src/verl_post_training_rl/reward_functions.py
    name: compute_score

ray:
  num_cpus: 8
  object_store_memory: 4294967296
